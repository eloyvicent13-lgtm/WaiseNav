name: Compile & Submit iOS App

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: waisenav-expo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies in waisenav-expo
        run: npm ci

      - name: Auto-increment build version
        run: node scripts/bump-build-number.js ${{ github.run_number }}

      - name: Stage app.json changes for EAS CLI
        run: git add app.json

      - name: Build IPA Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --local --non-interactive --output ./build.ipa

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: eas submit --platform ios --profile production --non-interactive --path ./build.ipa
